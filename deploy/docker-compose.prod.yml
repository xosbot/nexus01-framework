# Production docker-compose for navos.online
# Usage: docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d

services:
  # Override ollama to remove GPU requirement (use cloud LLM on CX22)
  ollama:
    deploy:
      resources:
        reservations:
          devices: []

  # Override nexus to add env vars for production
  nexus:
    environment:
      NEXUS_ALLOWED_ORIGINS: "https://navos.space,https://navos.online,http://localhost:8765"
      ENABLE_CLI: "false"
      ENABLE_WEB_UI: "true"
      COLD_MODE_ENABLED: "true"
      REQUIRE_APPROVAL_FOR_EXEC: "true"
      LOG_LEVEL: "INFO"
    volumes:
      - nexus_data:/app/data
      # Don't mount web/ in prod — baked into image

  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nexus
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - default

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot:latest
    container_name: nexus-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renew certificates every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 43200 & wait $${!}; done'"

volumes:
  certbot_www:
    name: nexus_certbot_www
  certbot_certs:
    name: nexus_certbot_certs
